apiVersion: v1
kind: Pod 
metadata: 
  name: random-number-generator
spec: 
  containers:
  - image: alpine
    name: alpine
    command: ["/bin/sh", "-c"]
    args: ["shuf -i 0-100 -n 1 >> /opt/number.out;"]
    volumeMounts:
    - mountPath: /opt
      name: pv-vol
  volumes:
  - name: pv-vol
    persistentVolumeClaim:
      claimName: my-claim

