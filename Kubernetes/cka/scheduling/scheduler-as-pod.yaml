apiVersion: v1
kind: Pod
metadata: 
  name: custom-scheduler
  namespace: kube-system
spec:
  conatiners:
  - command:
    - kube-scheduler
    - --address=127.0.0.1
    - --kubeconfig=/etc/kubernetes/scheduler.conf
    - --config=/etc/kubernetes/custom-scheduler-config.yaml  
    image: k8s.gcr.io/kube-scheduler-amd64:v1
    name: kube-scheduler  
