apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-rs
  labels:
    app: myapp
    type: front-end
spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        app: myapp
        type: front-end
    spec:
      containers:
        - name: nginx-container
          image: nginx:alpine
  replicas:
    3
    # one major difference between ReplicaSet and ReplicationController
  selector:
    matchLabels:
      type: front-end
