apiVersion: v1
kind: Pod
metadata:
  name: mc-pod
spec:
  volumes:
  - name: shared-volume
    emptyDir: {}
  containers:
  - image: nginx:1-alpine
    name: mc-pol-1
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  - name: mc-pod-2
    image: busybox:1
    command:
    - "sh"
    - "-c"
    - "while true; do date >> /var/log/shared/date.log; sleep 1; done"  
    volumeMounts:
    - name: shared-volume
      mountPath: /var/log/shared 
  - name: mc-pod-3 
    image: busybox:1
    command: 
    - "sh"
    - "-c" 
    - "tail -f /var/log/shared/date.log"       
    volumeMounts:
    - name: shared-volume
      mountPath: /var/log/shared

