apiVersion: kublet.config.k8s.io/v1beta1
kind: KubletConfiguration
authentication:
  x509:
    clientCAFile: "/var/lib/kubernetes/ca.pem"
authorization:
  mode: Webhook
clusterDomain: "cluster.local"
clusterDNS:
  - "10.32.0.10"
podCIDR: $(Pod_CIDR)
resolvConf: "/run/systemd/resolve/resolv.conf"
runtimeRequestTimeout: "15m"
tlsCertFile: "/var/lib/kublet/kublet-node1.crt"
tlsPrivateKeyFile: "/var/lib/kublet/kublet-node01.key"
